<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pocket AI - Sign Up</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body class="bg-slate-900 text-slate-100 font-sans min-h-screen flex items-center justify-center p-4">

  <div class="w-full max-w-md bg-slate-950 border border-slate-800 rounded-3xl p-8 shadow-2xl shadow-slate-950/80 relative overflow-hidden">
    
    <div class="absolute -top-10 -right-10 w-32 h-32 bg-emerald-500/10 rounded-full blur-2xl"></div>
    <div class="absolute -bottom-10 -left-10 w-32 h-32 bg-cyan-500/10 rounded-full blur-2xl"></div>

    <div class="text-center mb-6">
      <h1 class="font-extrabold text-2xl tracking-tight bg-gradient-to-r from-emerald-400 to-cyan-400 bg-clip-text text-transparent">Start Your Journey</h1>
      <p class="text-xs text-slate-400 mt-1">Level up your savings game in less than a minute.</p>
    </div>

    <form id="signup-form" class="space-y-4">
      <div>
        <label class="block text-xs font-semibold text-slate-400 mb-1.5 uppercase tracking-wider">Full Name</label>
        <div class="relative">
          <span class="absolute inset-y-0 left-0 flex items-center pl-3.5 pointer-events-none text-slate-500">
            <i data-lucide="user" class="w-4 h-4"></i>
          </span>
          <input type="text" id="fullname" placeholder="Jessica" required 
            class="w-full bg-slate-900 border border-slate-800 rounded-xl pl-10 pr-3 py-2 text-sm text-slate-100 placeholder-slate-600 focus:outline-none focus:border-cyan-500 transition-colors">
        </div>
      </div>

      <div>
        <label class="block text-xs font-semibold text-slate-400 mb-1.5 uppercase tracking-wider">Email</label>
        <div class="relative">
          <span class="absolute inset-y-0 left-0 flex items-center pl-3.5 pointer-events-none text-slate-500">
            <i data-lucide="mail" class="w-4 h-4"></i>
          </span>
          <input type="email" id="email" placeholder="yourname@gmail.com" required 
            class="w-full bg-slate-900 border border-slate-800 rounded-xl pl-10 pr-3 py-2 text-sm text-slate-100 placeholder-slate-600 focus:outline-none focus:border-cyan-500 transition-colors">
        </div>
      </div>

      <div>
        <label class="block text-xs font-semibold text-slate-400 mb-1.5 uppercase tracking-wider">Monthly Allowance (RM)</label>
        <div class="relative">
          <span class="absolute inset-y-0 left-0 flex items-center pl-3.5 pointer-events-none text-slate-500 font-bold text-xs">RM</span>
          <input type="number" id="allowance" placeholder="600" required 
            class="w-full bg-slate-900 border border-slate-800 rounded-xl pl-10 pr-3 py-2 text-sm text-slate-100 placeholder-slate-600 focus:outline-none focus:border-cyan-500 transition-colors">
        </div>
      </div>

      <div>
        <label class="block text-xs font-semibold text-slate-400 mb-1.5 uppercase tracking-wider">Create Password</label>
        <div class="relative">
          <span class="absolute inset-y-0 left-0 flex items-center pl-3.5 pointer-events-none text-slate-500">
            <i data-lucide="lock" class="w-4 h-4"></i>
          </span>
          <input type="password" id="password" placeholder="••••••••" minlength="6" required 
            class="w-full bg-slate-900 border border-slate-800 rounded-xl pl-10 pr-3 py-2 text-sm text-slate-100 placeholder-slate-600 focus:outline-none focus:border-cyan-500 transition-colors">
        </div>
      </div>

      <button type="submit" id="submit-btn"
        class="w-full bg-gradient-to-r from-emerald-500 to-cyan-500 text-slate-950 font-black text-sm py-3 rounded-xl shadow-lg shadow-cyan-500/10 hover:brightness-110 active:scale-[0.99] transition-all mt-4 flex items-center justify-center gap-2">
        <span>CREATE MY PROFILE</span>
      </button>
    </form>

    <p class="text-xs text-center text-slate-500 mt-5">
      Already have a profile? <a href="login-form.html" class="text-cyan-400 hover:underline font-medium">Log In here</a>
    </p>

  </div>

  <script>
    lucide.createIcons();

    document.getElementById('signup-form').addEventListener('submit', async function(e) {
      e.preventDefault();
      const submitBtn = document.getElementById('submit-btn');
      const originalText = submitBtn.innerHTML;
      
      const formData = new URLSearchParams();
      formData.append('fullname', document.getElementById('fullname').value.trim());
      formData.append('email', document.getElementById('email').value.trim());
      formData.append('allowance', document.getElementById('allowance').value);
      formData.append('password', document.getElementById('password').value);

      try {
        submitBtn.disabled = true;
        submitBtn.innerHTML = `<span>PROCESSING...</span>`;

        const response = await fetch('register.php', {
          method: 'POST',
          headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
          body: formData
        });

        const result = await response.json();
        alert(result.message);

        if (result.status === "success") {
          window.location.href = 'login-form.html';
        } else {
          submitBtn.disabled = false;
          submitBtn.innerHTML = originalText;
        }
      } catch (error) {
        console.error(error);
        alert("Ralat menghubungi PHP server.");
        submitBtn.disabled = false;
        submitBtn.innerHTML = originalText;
      }
    });
  </script>
</body>
</html>
