<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pocket AI - Log In</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body class="bg-slate-900 text-slate-100 font-sans min-h-screen flex items-center justify-center p-4">

  <div class="w-full max-w-md bg-slate-950 border border-slate-800 rounded-3xl p-8 shadow-2xl shadow-slate-950/80">
    <div class="text-center mb-6">
      <h1 class="font-extrabold text-2xl bg-gradient-to-r from-emerald-400 to-cyan-400 bg-clip-text text-transparent">Welcome Back</h1>
      <p class="text-xs text-slate-400 mt-1">Ready to manage your rings today?</p>
    </div>

    <form id="login-form" class="space-y-4">
      <div>
        <label class="block text-xs font-semibold text-slate-400 mb-1.5 uppercase">Email</label>
        <div class="relative">
          <span class="absolute inset-y-0 left-0 flex items-center pl-3.5 text-slate-500"><i data-lucide="mail" class="w-4 h-4"></i></span>
          <input type="email" id="email" required class="w-full bg-slate-900 border border-slate-800 rounded-xl pl-10 pr-3 py-2 text-sm">
        </div>
      </div>

      <div>
        <label class="block text-xs font-semibold text-slate-400 mb-1.5 uppercase">Password</label>
        <div class="relative">
          <span class="absolute inset-y-0 left-0 flex items-center pl-3.5 text-slate-500"><i data-lucide="lock" class="w-4 h-4"></i></span>
          <input type="password" id="password" required class="w-full bg-slate-900 border border-slate-800 rounded-xl pl-10 pr-3 py-2 text-sm">
        </div>
      </div>

      <button type="submit" id="login-btn" class="w-full bg-gradient-to-r from-emerald-500 to-cyan-500 text-slate-950 font-black text-sm py-3 rounded-xl mt-4">
        LOG IN
      </button>
    </form>
    
    <p class="text-xs text-center text-slate-500 mt-5">
      Belum ada profile? <a href="signup.html" class="text-cyan-400 hover:underline">Daftar di sini</a>
    </p>
  </div>

  <script>
    lucide.createIcons();

    document.getElementById('login-form').addEventListener('submit', async function(e) {
      e.preventDefault();
      const loginBtn = document.getElementById('login-btn');
      
      const formData = new URLSearchParams();
      formData.append('email', document.getElementById('email').value.trim());
      formData.append('password', document.getElementById('password').value);

      try {
        loginBtn.innerHTML = "VERIFYING...";
        const response = await fetch('login.php', {
          method: 'POST',
          headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
          body: formData
        });

        const result = await response.json();
        if (result.status === "success") {
          window.location.href = 'index.php';
        } else {
          alert(result.message);
          loginBtn.innerHTML = "LOG IN";
        }
      } catch (error) {
        alert("Ralat log masuk.");
        loginBtn.innerHTML = "LOG IN";
      }
    });
  </script>
</body>
</html>
